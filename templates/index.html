<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fira Code', monospace; 
            background: radial-gradient(circle at center, #1a1f29 0%, #0d1117 100%);
            color: #c9d1d9; 
            height: 100vh;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .neon-border-green {
            border-left: 4px solid #238636;
            box-shadow: -5px 0 15px rgba(35, 134, 54, 0.2);
        }
        #chat-box {
            height: 65vh;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-5xl glass-panel rounded-xl overflow-hidden flex flex-col">
        
        <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#161b22]">
            <div>
                <h1 class="text-xl font-bold text-white tracking-widest neon-text">SOMRAT OMOR</h1>
                <p class="text-[10px] text-blue-400 opacity-80 uppercase tracking-tighter italic">Advanced AI Control Unit</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-xs font-semibold text-green-500 uppercase">System Active</span>
            </div>
        </div>

        <div id="chat-box" class="p-6 space-y-4 overflow-y-auto">
            <div class="neon-border-green bg-[#0d1117] p-3 rounded-r-lg">
                <span class="text-blue-400 font-bold">[NEXUS]:</span> 
                <span class="text-gray-300 ml-2 italic">নেক্সাস কমান্ড সেন্টার এখন জাগ্রত। সম্রাট, আপনার আদেশের অপেক্ষায়...</span>
            </div>
        </div>

        <div class="p-6 bg-[#161b22] border-t border-gray-800">
            <div class="relative flex items-center">
                <span class="absolute left-4 text-blue-500 font-bold">$</span>
                <input type="text" id="user-input" 
                       class="w-full bg-[#0d1117] text-white pl-10 pr-32 py-4 rounded-lg outline-none border border-gray-700 input-glow transition-all" 
                       placeholder="Enter build command or message...">
                <button onclick="sendMessage()" 
                        class="absolute right-2 bg-[#238636] hover:bg-[#2ea043] text-white px-6 py-2 rounded-md font-bold text-sm transition-all transform hover:scale-105 active:scale-95">
                    EXECUTE
                </button>
            </div>
        </div>

    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `
                <div class="flex flex-col items-end">
                    <div class="bg-gray-800 text-gray-200 p-3 rounded-lg max-w-[80%] border-r-4 border-blue-500">
                        ${message}
                    </div>
                </div>`;
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                chatBox.innerHTML += `
                    <div class="neon-border-green bg-[#0d1117] p-3 rounded-r-lg max-w-[90%]">
                        <span class="text-green-500 font-bold">[NEXUS]:</span> 
                        <span class="text-gray-300 ml-2">${data.reply}</span>
                    </div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="text-red-500 font-bold text-center">[CRITICAL ERROR]: CONNECTION FAILED</div>`;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
