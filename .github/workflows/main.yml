name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-dev
          pip install --upgrade Cython==0.29.33 buildozer
      - name: Build with Auto-Accept
        run: |
          # SDK লাইসেন্স অটো-অ্যাকসেপ্ট করা এবং বিল্ড রান করা
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer -v android debug
        env:
          HOME: /home/runner
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-AI-APK
          path: bin/*.apk
