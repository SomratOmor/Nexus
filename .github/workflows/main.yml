name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1
        with:
          save_buildozer_cache: true
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-AI-APK
          path: bin/*.apk